name: Auditoria de segurança

# Auditoria das dependências (npm audit). Falha o CI em vulnerabilidades de
# severidade HIGH ou superior — bloqueando a entrada de dependências
# vulneráveis em cada push/PR. Corre também semanalmente para apanhar
# vulnerabilidades divulgadas após o merge; nesse caso abre/atualiza uma issue.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Segunda-feira, 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: npm audit (falha em high+)
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high | tee audit-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Abrir issue em vulnerabilidade high (apenas no agendamento)
        if: github.event_name == 'schedule' && steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'O npm audit detetou vulnerabilidades de severidade high ou superior.';
            try { body = '```\n' + fs.readFileSync('audit-report.txt', 'utf8') + '\n```'; } catch {}

            const { data: abertas } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seguranca',
            });

            if (abertas.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: abertas[0].number,
                body: `Nova auditoria (${new Date().toISOString().slice(0, 10)}):\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Vulnerabilidades de dependências — ${new Date().toISOString().slice(0, 10)}`,
                body,
                labels: ['seguranca'],
              });
            }

      - name: Falhar o CI se houver vulnerabilidade high+
        if: steps.audit.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "::error::npm audit encontrou vulnerabilidades de severidade high ou superior."
          echo "Resolver antes de fazer merge. Evitar 'npm audit fix --force' sem verificar mudanças disruptivas."
          exit 1
